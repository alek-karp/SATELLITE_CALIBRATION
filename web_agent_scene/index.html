<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Satellite Calibration Episode Demo</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/"
        }
      }
    </script>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="viewport">
      <div id="scene-root"></div>
      <section class="hud hud--left" aria-label="Episode telemetry" data-panel="telemetry">
        <div class="hud__header">
          <div>
            <p class="eyebrow">Episode demo</p>
            <h1>Satellite calibration pass</h1>
          </div>
          <button class="hud__toggle" type="button" aria-expanded="true" aria-label="Collapse telemetry panel" data-panel-toggle>
            <span aria-hidden="true">−</span>
          </button>
        </div>

        <div class="hud__body">
          <div class="phase" data-stat="phase"></div>

          <div class="stat-grid">
            <div>
              <span>Time</span>
              <strong data-stat="time"></strong>
            </div>
            <div>
              <span>SNR</span>
              <strong data-stat="snr"></strong>
            </div>
            <div>
              <span>Lock</span>
              <strong data-stat="lock"></strong>
            </div>
            <div>
              <span>Reward</span>
              <strong data-stat="reward"></strong>
            </div>
            <div>
              <span>Az error</span>
              <strong data-stat="az"></strong>
            </div>
            <div>
              <span>El error</span>
              <strong data-stat="el"></strong>
            </div>
            <div>
              <span>Freq</span>
              <strong data-stat="freq"></strong>
            </div>
            <div>
              <span>Pol</span>
              <strong data-stat="pol"></strong>
            </div>
            <div>
              <span>Bandwidth</span>
              <strong data-stat="bandwidth"></strong>
            </div>
            <div>
              <span>Score</span>
              <strong data-stat="score"></strong>
            </div>
          </div>

          <p class="scripted-action">Current action: <strong data-stat="action"></strong></p>
        </div>
      </section>

      <section class="hud hud--right" aria-label="Episode events" data-panel="events">
        <div class="hud__header">
          <div>
            <p class="eyebrow">Scripted agent</p>
            <h2>Episode events</h2>
          </div>
          <button class="hud__toggle" type="button" aria-expanded="true" aria-label="Collapse events panel" data-panel-toggle>
            <span aria-hidden="true">−</span>
          </button>
        </div>
        <div class="hud__body">
          <ol class="event-log" data-event-log aria-label="Episode event log"></ol>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
